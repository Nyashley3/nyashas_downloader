<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nyasha's Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f4f9ff;
        --card: rgba(255,255,255,0.9);
        --text: #0f172a;
        --muted: #4b5563;
        --primary: #2563eb;
        --primary-2: #3b82f6;
        --accent: #38bdf8;
        --border: rgba(37, 99, 235, 0.16);
        --shadow: 0 20px 45px rgba(37, 99, 235, 0.18);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', Segoe UI, Arial, sans-serif;
        background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #f8fbff 100%);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .shell {
        width: min(760px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 36px;
        backdrop-filter: blur(16px);
        position: relative;
        overflow: hidden;
      }
      .shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(37,99,235,0.08), transparent 45%, rgba(56,189,248,0.08));
        pointer-events: none;
      }
      .brand {
        text-align: center;
        margin-bottom: 24px;
      }
      .brand h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(90deg, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }
      .alert {
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 16px;
        background: #fee2e2;
        color: #b91c1c;
        border: 1px solid #fecaca;
      }
      form { display: grid; gap: 14px; }
      .input-row {
        display: flex;
        gap: 10px;
        background: white;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 8px;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
      }
      input[type="text"] {
        flex: 1;
        border: 0;
        outline: none;
        padding: 14px 14px;
        font-size: 1rem;
        background: transparent;
        color: var(--text);
      }
      button {
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 60%, var(--accent) 100%);
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(37, 99, 235, 0.28); }
      .accent-line {
        display: inline-block;
        margin-top: 14px;
        font-size: 0.95rem;
        color: #2563eb;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .footer {
        margin-top: 18px;
        text-align: center;
        color: var(--muted);
        font-size: 0.95rem;
      }
      @media (max-width: 640px) {
        body { padding: 12px; }
        .shell { padding: 24px; border-radius: 20px; }
        .input-row { flex-direction: column; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="brand">
        <h1>Nyasha's Downloader</h1>
        <p>Paste a link, pick a format, and download with style.</p>
      </div>
      {% if error %}
        <div class="alert">{{ error }}</div>
      {% endif %}
      <form action="/info" method="post">
        <div class="input-row">
          <input type="text" name="url" placeholder="Paste video URL here" required />
          <button type="submit">Get Info</button>
        </div>
      </form>
      <div class="footer">Powered by <strong>yt-dlp</strong> (server-side).</div>
      <div class="accent-line">Inspired by my mom</div>
    </div>
  </body>
</html>
